<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 400px;
        font-family: 'Inter', system-ui, sans-serif;
      }

      .header {
        background: linear-gradient(135deg, #0ea5e9, #0284c7);
        color: white;
        padding: 20px;
        text-align: center;
      }

      .header h1 {
        font-size: 20px;
        margin-bottom: 4px;
      }

      .header p {
        font-size: 12px;
        opacity: 0.9;
      }

      .content {
        padding: 20px;
      }

      .api-key-section {
        margin-bottom: 20px;
      }

      .api-key-section label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #374151;
      }

      .api-key-section input {
        width: 100%;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
      }

      .api-key-section input:focus {
        outline: none;
        border-color: #0ea5e9;
        ring: 2px solid #0ea5e9;
      }

      .translation-section {
        margin-bottom: 20px;
      }

      .lang-selectors {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      .lang-selectors select {
        flex: 1;
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
      }

      textarea {
        width: 100%;
        height: 100px;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
        resize: none;
        margin-bottom: 12px;
      }

      textarea:focus {
        outline: none;
        border-color: #0ea5e9;
      }

      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: #0ea5e9;
        color: white;
      }

      .btn-primary:hover {
        background: #0284c7;
      }

      .btn-primary:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }

      .footer {
        padding: 16px 20px;
        border-top: 1px solid #e5e7eb;
        text-align: center;
      }

      .footer a {
        color: #0ea5e9;
        text-decoration: none;
        font-size: 12px;
      }

      .footer a:hover {
        text-decoration: underline;
      }

      .loading {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #fff;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .result {
        background: #f3f4f6;
        padding: 12px;
        border-radius: 8px;
        margin-top: 12px;
        font-size: 14px;
        line-height: 1.5;
      }

      .shortcuts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 16px;
      }

      .shortcut {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        background: #f9fafb;
        border-radius: 6px;
        font-size: 11px;
      }

      .shortcut kbd {
        background: #e5e7eb;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>🔤 VizoTranslator</h1>
      <p>AI-Powered Translation</p>
    </div>

    <div class="content">
      <div class="api-key-section">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="Enter your API key" />
      </div>

      <div class="translation-section">
        <div class="lang-selectors">
          <select id="sourceLang">
            <option value="auto">Auto-detect</option>
            <option value="en" selected>English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
          </select>
          <span style="line-height: 36px">→</span>
          <select id="targetLang">
            <option value="en">English</option>
            <option value="es" selected>Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
          </select>
        </div>

        <textarea id="sourceText" placeholder="Enter text to translate..."></textarea>
        <button id="translateBtn" class="btn btn-primary">Translate</button>

        <div id="result" class="result" style="display: none"></div>
      </div>

      <div class="shortcuts">
        <div class="shortcut"><kbd>Ctrl</kbd>+<kbd>Shift</kbd> T</div>
        <div class="shortcut"><kbd>Ctrl</kbd>+<kbd>Shift</kbd> S</div>
      </div>
    </div>

    <div class="footer">
      <a href="https://vizotranslator.com/dashboard" target="_blank">Open Dashboard →</a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
